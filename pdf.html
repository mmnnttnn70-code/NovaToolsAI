<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Reader</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>📄 PDF Reader</h1>
        <p class="subtitle">Read PDF files with AI</p>
    </header>

    <input
        type="file"
        id="pdfFile"
        accept=".pdf">

    <button id="openBtn">
        📖 Open PDF
    </button>

    <div class="result" id="result">

        No PDF selected.

    </div>

    <button onclick="location.href='index.html'">
        ⬅ Back
    </button>

</div>

<script src="pdf.js"></script>

</body>

</html>
