<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>💬 AI Chat</h1>
        <p>Welcome to Aivora AI</p>
    </header>

    <main>

        <div id="messages"
            style="
            height:300px;
            background:white;
            border:1px solid #ccc;
            border-radius:10px;
            padding:10px;
            overflow-y:auto;
            margin-bottom:20px;">
        </div>

        <input
            type="text"
            id="messageInput"
            placeholder="Type your message..."
            style="width:100%;padding:15px;font-size:18px;">

        <br><br>

        <button id="sendBtn">
            📤 Send
        </button>

        <br><br>

        <button onclick="window.location.href='index.html'">
            ⬅ Back
        </button>

    </main>

    <script src="app.js"></script>

</body>

</html>
