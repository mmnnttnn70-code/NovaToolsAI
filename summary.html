<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>📝 Summary</h1>
        <p class="subtitle">Summarize any text</p>
    </header>

    <textarea
        id="inputText"
        placeholder="Paste your text here...">
    </textarea>

    <button id="summaryBtn">
        📝 Summarize
    </button>

    <textarea
        id="outputText"
        placeholder="Summary..."
        readonly>
    </textarea>

    <button id="copyBtn">
        📋 Copy
    </button>

    <button onclick="window.location.href='index.html'">
        ⬅ Back
    </button>

</div>

<script src="summary.js"></script>

</body>
</html>
